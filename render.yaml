services:
  - type: web
    name: instagram-downloader
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      # Instagram: exporta tus cookies desde Chrome (extensión "Get cookies.txt LOCALLY"
      # → exporta instagram.com en Netscape format → base64-encódalo → pégalo aquí)
      - key: IG_COOKIES
        sync: false
      # Alternativa más simple: solo el valor de la cookie "sessionid" de instagram.com
      - key: IG_SESSIONID
        sync: false
      # Apify fallback opcional — muy útil para reels/historias
      - key: APIFY_API_TOKEN
        sync: false
