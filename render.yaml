services:
  - type: web
    name: instagram-downloader
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: IG_USERNAME
        sync: false
      - key: IG_PASSWORD
        sync: false
